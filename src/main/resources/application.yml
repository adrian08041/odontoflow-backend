spring:
  application:
    name: odontoflow-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/odontoflow_db
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080
  servlet:
    context-path: /api

# Swagger UI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Configurações customizadas do JWT
jwt:
  secret: odontoflow-secret-key-que-deve-ter-pelo-menos-256-bits-para-HS256
  expiration: 86400000  # 24 horas em milissegundos
